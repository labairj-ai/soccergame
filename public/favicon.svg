<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a1628"/>
  <!-- Baseball white core -->
  <circle cx="32" cy="32" r="22" fill="#f5f5f0"/>
  <!-- Red stitching — classic baseball seam shape -->
  <!-- Left curved seam -->
  <path d="M 20 12 C 13 22, 13 42, 20 52" fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right curved seam -->
  <path d="M 44 12 C 51 22, 51 42, 44 52" fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top stitch arc -->
  <path d="M 16 25 C 24 20, 40 20, 48 25" fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom stitch arc -->
  <path d="M 16 39 C 24 44, 40 44, 48 39" fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Subtle shadow ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
</svg>
